# BugHunter-OS configuration
# This file is sourced by Bash scripts. Keep values shell-safe.

# General
BUGHUNTER_NAME="BugHunter-OS"
BUGHUNTER_ENV="production"
DEFAULT_PROFILE="safe"
DEFAULT_MODULES="recon,httpx,katana,gau,nuclei,secrets"
REQUIRE_AUTHORIZATION_CONFIRMATION="true"

# Workspace paths
PROJECT_ROOT=""
CONFIG_DIR="config"
MODULE_DIR="modules"
UTILS_DIR="utils"
OUTPUT_DIR="output"
RAW_OUTPUT_DIR="raw"
NORMALIZED_OUTPUT_DIR="normalized"
FINDINGS_OUTPUT_DIR="findings"
REPORTS_DIR="reports"
LOGS_DIR="logs"
SCREENSHOTS_DIR="screenshots"
TEMPLATES_DIR="templates"
WORDLISTS_DIR="wordlists"

# Runtime behavior
RUN_ID_FORMAT="%Y%m%d-%H%M%S"
LOG_LEVEL="info"
ENABLE_COLOR="true"
ENABLE_TIMESTAMPS="true"
FAIL_FAST="false"
DRY_RUN="false"
KEEP_TEMP_FILES="false"
MAX_PARALLEL_MODULES="1"

# Safety controls
SAFE_MODE="true"
ALLOW_ACTIVE_CHECKS="false"
ALLOW_DESTRUCTIVE_CHECKS="false"
ALLOW_OUT_OF_SCOPE_REDIRECTS="false"
MAX_REQUESTS_PER_SECOND="3"
MAX_CONCURRENT_REQUESTS="10"
HTTP_TIMEOUT_SECONDS="15"
HTTP_RETRY_COUNT="1"
SCAN_TIMEOUT_SECONDS="3600"
MODULE_TIMEOUT_SECONDS="900"

# HTTP defaults
USER_AGENT="BugHunter-OS/1.0 authorized-security-testing"
FOLLOW_REDIRECTS="true"
VERIFY_TLS="true"
CAPTURE_RESPONSE_HEADERS="true"
CAPTURE_RESPONSE_BODIES="false"
MAX_RESPONSE_BODY_BYTES="1048576"

# Profiles
SAFE_MODULES="recon,httpx,gau,katana,secrets"
BALANCED_MODULES="recon,httpx,gau,katana,nuclei,js,secrets,wordpress,openredirect"
DEEP_MODULES="recon,httpx,gau,katana,nuclei,js,secrets,wordpress,openredirect,xss,sqli,lfi,ssrf,idor,api"

SAFE_RATE_LIMIT="3"
BALANCED_RATE_LIMIT="8"
DEEP_RATE_LIMIT="15"

SAFE_CONCURRENCY="5"
BALANCED_CONCURRENCY="15"
DEEP_CONCURRENCY="30"

# Tool command names
TOOL_CURL="curl"
TOOL_JQ="jq"
TOOL_SORT="sort"
TOOL_SED="sed"
TOOL_AWK="awk"
TOOL_GREP="grep"
TOOL_HTTPX="httpx"
TOOL_KATANA="katana"
TOOL_GAU="gau"
TOOL_NUCLEI="nuclei"
TOOL_SUBFINDER="subfinder"
TOOL_GOWITNESS="gowitness"
TOOL_NAABU="naabu"
TOOL_DNSX="dnsx"
TOOL_NOTIFY="notify"
TOOL_UNCOVER="uncover"
TOOL_GO="go"
TOOL_PYTHON="python3"
TOOL_PIP="pip3"
TOOL_PIPX="pipx"
TOOL_NODE="node"
TOOL_NPM="npm"

# Installer settings
INSTALL_LOG_FILE="logs/install.log"
INSTALL_GO_TOOLS="true"
INSTALL_PYTHON_TOOLS="true"
INSTALL_NODE_TOOLS="true"
APT_TOOL_SPECS="curl:curl jq:jq sort:coreutils sed:sed awk:gawk grep:grep go:golang-go python3:python3 pip3:python3-pip pipx:pipx node:nodejs npm:npm httpx:httpx-toolkit katana:katana gau:gau nuclei:nuclei subfinder:subfinder gowitness:gowitness naabu:naabu dnsx:dnsx notify:notify uncover:uncover"
GO_TOOL_SPECS="subfinder:github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest httpx:github.com/projectdiscovery/httpx/cmd/httpx@latest katana:github.com/projectdiscovery/katana/cmd/katana@latest nuclei:github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest naabu:github.com/projectdiscovery/naabu/v2/cmd/naabu@latest dnsx:github.com/projectdiscovery/dnsx/cmd/dnsx@latest notify:github.com/projectdiscovery/notify/cmd/notify@latest uncover:github.com/projectdiscovery/uncover/cmd/uncover@latest gau:github.com/lc/gau/v2/cmd/gau@latest"
PYTHON_TOOL_SPECS="arjun:arjun uro:uro waybackpy:waybackpy"
NODE_TOOL_SPECS="retire:retire secretlint:secretlint"

# Tool options
HTTPX_DEFAULT_FLAGS="-silent -json -status-code -title -tech-detect -follow-redirects"
KATANA_DEFAULT_FLAGS="-silent -jsonl"
GAU_DEFAULT_FLAGS=""
NUCLEI_DEFAULT_FLAGS="-silent -jsonl"
SUBFINDER_DEFAULT_FLAGS="-silent"
GOWITNESS_DEFAULT_FLAGS="scan single"

# Template and wordlist paths
NUCLEI_TEMPLATES_PATH="templates/nuclei"
CUSTOM_TEMPLATES_PATH="templates/custom"
REPORT_TEMPLATE_PATH="templates/report.md"
COMMON_WORDLIST_PATH="wordlists/common.txt"
PARAMETER_WORDLIST_PATH="wordlists/parameters.txt"
PAYLOAD_WORDLIST_PATH="wordlists/payloads.txt"

# Module-specific defaults
RECON_INCLUDE_SUBDOMAINS="true"
RECON_RESOLVE_HOSTS="true"
HTTPX_PROBE_PORTS="80,443,8080,8443"
KATANA_CRAWL_DEPTH="2"
KATANA_MAX_DURATION="10m"
GAU_INCLUDE_SUBS="true"
NUCLEI_SEVERITIES="critical,high,medium,low,info"
NUCLEI_EXCLUDE_TAGS="dos,destructive,intrusive"
JS_DOWNLOAD_FILES="false"
SECRETS_MIN_CONFIDENCE="medium"
SCREENSHOT_ENABLED="false"
SCREENSHOT_TIMEOUT_SECONDS="20"

# Reporting
REPORT_FORMATS="markdown,json"
REPORT_INCLUDE_RAW_PATHS="true"
REPORT_INCLUDE_TOOL_VERSIONS="true"
REPORT_INCLUDE_FALSE_POSITIVE_NOTES="true"
REPORT_DEFAULT_SEVERITY="info"

# Local overrides
# Set BUGHUNTER_LOCAL_CONFIG to an ignored file path to load private overrides.
BUGHUNTER_LOCAL_CONFIG="${BUGHUNTER_LOCAL_CONFIG:-}"
